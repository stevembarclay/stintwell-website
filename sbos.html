<script type="module">
  lucide.createIcons();

  // ============================
  // MODAL CONTROLS
  // ============================
  window.openModal = function () {
    const modal = document.getElementById('emailModal');
    if (modal) {
      modal.classList.remove('hidden');
      const nameInput = document.getElementById('name');
      if (nameInput) nameInput.focus();
    }
  };

  window.closeModal = function () {
    const modal = document.getElementById('emailModal');
    if (modal) {
      modal.classList.add('hidden');
    }
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') window.closeModal();
  });


  // ============================
  // FORM SUBMISSION
  // ============================
  const form = document.getElementById('leadForm');
  const submitBtn = document.getElementById('submitBtn');

  if (form) {
    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = "Launching…";

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const company = document.getElementById('company').value;

      // 1. Attempt to send email notification (non-blocking)
      try {
        await fetch("https://formsubmit.co/ajax/steve@stintwell.com", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            _subject: "New SBOS Demo Lead",
            name,
            email,
            company,
            source: "sbos_landing_v2"
          })
        });
      } catch (err) {
        console.warn("Email service failed — proceeding anyway.");
      }

      // 2. Store lead via your backend
      try {
        await fetch("/api/send-lead", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name,
            email,
            company,
            timestamp: new Date().toISOString(),
            source: "sbos_landing"
          })
        });
      } catch (err) {
        console.warn("Lead storage failed — proceeding anyway.");
      }

      // 3. Generate token
      const token = btoa(JSON.stringify({
        email,
        company,
        name,
        ts: Date.now()
      }));

      // 4. Redirect to SBOS demo
      window.location.href = `https://sbos.stintwell.com?demo=${token}`;
    });
  }
</script>
